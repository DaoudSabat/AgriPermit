# docker-compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
services:
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/web/dist:/var/www/html:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on: [api]
    networks: [agripermit_network]

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  api:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    volumes:
      - ./packages:/packages:ro

  worker:
    restart: unless-stopped
    volumes:
      - ./packages:/packages:ro

  postgres:
    restart: unless-stopped
    ports: []

  redis:
    restart: unless-stopped
    ports: []
