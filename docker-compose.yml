services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: agripermit_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agripermit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agripermit_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-agripermit_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agripermit_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agripermit_network

  redis:
    image: redis:7-alpine
    container_name: agripermit_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agripermit_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: agripermit_api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./packages:/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - agripermit_network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: agripermit_worker
    env_file: .env
    volumes:
      - ./apps/worker:/app
      - ./packages:/packages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info
    networks:
      - agripermit_network

  minio:
    image: minio/minio:latest
    container_name: agripermit_minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - agripermit_network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  agripermit_network:
    driver: bridge
